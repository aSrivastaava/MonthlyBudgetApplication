services:
  mongodb:
    image: mongo:7
    container_name: budget_mongodb
    restart: unless-stopped
    volumes:
      - budget_mongodb:/data/db
    environment:
      MONGO_INITDB_DATABASE: monthlybudget

  app:
    build: .
    container_name: budget_app
    restart: unless-stopped
    ports:
      - "4040:5000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/monthlybudget
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      NODE_ENV: production
    volumes:
      - budget_uploads:/app/uploads

volumes:
  budget_mongodb:
  budget_uploads:
